<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="{{ site.baseurl }}/favicon.png">

<link rel="apple-touch-icon" href="{{ site.baseurl }}/favicon.png">

    <title>{{ page.title }}</title>
    <style>
        :root {
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text: #f8fafc;
            --sub-text: #94a3b8;
            --accent: #38bdf8; 
        }

        /* RESET: Kills the "cursed" underlines and default link colors */
        * { box-sizing: border-box; }
        
        a { 
            text-decoration: none !important; 
            color: inherit; 
        }

        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin-top: 40px;
        }

        main {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { 
            font-size: 2.8rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-weight: 800;
            line-height: 1.2;
        }

        /* ARCHIVE LIST: Clean, full-box clickable boxes */
        .post-list {
            list-style: none;
            padding: 0;
            margin: 30px 0 0 0;
        }

        .post-list li {
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease-in-out;
            overflow: hidden;
        }

        .post-link-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px;
            width: 100%;
            text-decoration: none;
        }

        .post-list li:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .post-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            transition: color 0.2s;
        }

        .post-list li:hover .post-title {
            color: #fff; /* Glows white when hovering over the box */
        }

        .post-date {
            color: var(--sub-text);
            font-size: 0.9rem;
            font-family: monospace;
            opacity: 0.8;
        }

        /* CONTENT */
        .post-content { font-size: 1.15rem; }
        
        nav {
            margin-bottom: 25px;
            display: flex;
            gap: 25px;
        }

        nav a {
            color: var(--sub-text);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.2s;
        }

        nav a:hover { color: var(--accent); }

        hr { border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 40px 0; }

        img { max-width: 100%; border-radius: 12px; }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            main { padding: 25px; }
            .post-link-wrapper { flex-direction: column; align-items: flex-start; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="{{ site.baseurl }}/">xyrotype</a>
            <a href="https://discord.gg/FrVqEaBCtu" target="_blank">Discord</a>
            <a href="https://youtube.com/@Xyrotype" target="_blank">Youtube</a>
        </nav>

        <main>
            {{ content }}
        </main>

        <footer style="text-align: center; margin-top: 50px; color: var(--sub-text); font-size: 0.8rem; opacity: 0.5;">
            © {{ "now" | date: "%Y" }} | Powered by xyrotype
        </footer>
    </div>
</body>
</html>
