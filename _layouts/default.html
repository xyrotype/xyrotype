<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <link rel="icon" type="image/png" href="{{ site.baseurl }}/favicon.png">
    
    <style>
        :root {
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text: #f8fafc;
            --sub-text: #94a3b8;
            --accent: #38bdf8; 
        }

        /* RESET */
        * { box-sizing: border-box; }
        a { text-decoration: none !important; color: inherit; }

        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin-top: 40px;
        }

        main {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { 
            font-size: 2.8rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-weight: 800;
        }

        /* ABOUT SECTION */
        .about-section {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            padding-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
        }

        .about-text h2 { margin: 0 0 10px 0; color: #fff; }
        .about-text p { margin: 0 0 15px 0; color: var(--sub-text); }

        .social-links { display: flex; gap: 12px; flex-wrap: wrap; }
        .social-btn {
            padding: 6px 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }
        .social-btn:hover { background: var(--accent); color: #0f172a; transform: translateY(-2px); }

        /* EMBED GRID */
        .embed-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 50px;
        }
/* Styling for the middle headers */
.section-title {
    font-size: 2rem;
    font-weight: 800;
    margin-top: 60px; /* Gives breathing room after the widgets */
    margin-bottom: 25px;
    background: linear-gradient(to right, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
}

/* Optional: Add a subtle divider above the title for better organization */
.section-title::before {
    content: '';
    display: block;
    width: 50px;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    margin-bottom: 15px;
}

        /* ARCHIVE LIST */
        .post-list { list-style: none; padding: 0; margin: 30px 0 0 0; }
        .post-list li {
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
            overflow: hidden;
        }
        .post-link-wrapper { display: flex; justify-content: space-between; align-items: center; padding: 22px; width: 100%; }
        .post-list li:hover { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); transform: translateY(-3px); }
        .post-title { font-size: 1.25rem; font-weight: 700; color: var(--accent); }
        .post-list li:hover .post-title { color: #fff; }
        .post-date { color: var(--sub-text); font-size: 0.9rem; font-family: monospace; opacity: 0.8; }

        /* NAV */
        nav { margin-bottom: 25px; display: flex; gap: 25px; }
        nav a { color: var(--sub-text); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        nav a:hover { color: var(--accent); }

        img { max-width: 100%; border-radius: 12px; }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .about-section { flex-direction: column; text-align: center; }
            .embed-grid { grid-template-columns: 1fr; }
            .post-link-wrapper { flex-direction: column; align-items: flex-start; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="{{ site.baseurl }}/">xyrotype</a>
            <a href="https://discord.gg/FrVqEaBCtu" target="_blank">Discord</a>
            <a href="https://youtube.com/@Xyrotype" target="_blank">Youtube</a>
        </nav>
        <main>
            {{ content }}
        </main>
        <footer style="text-align: center; margin-top: 50px; color: var(--sub-text); font-size: 0.8rem; opacity: 0.5;">
            © {{ "now" | date: "%Y" }} | Powered by xyrotype
        </footer>
    </div>
</body>
</html>
