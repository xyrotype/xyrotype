<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <style>
        :root {
            --bg: #0f172a; /* Deep Navy */
            --card-bg: #1e293b; /* Lighter Slate */
            --text: #f8fafc;
            --sub-text: #94a3b8;
            --accent: #38bdf8; /* Electric Blue */
        }

        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin-top: 40px;
        }

        /* The main content box */
        main {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { 
            font-size: 2.8rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .post-content {
            font-size: 1.15rem;
            color: var(--text);
        }

        /* Style for code blocks since this is a tech site */
        pre {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--accent);
        }

        /* Navigation */
        nav {
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--sub-text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        hr {
            border: 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 40px 0;
        }

        /* Make images responsive */
        img {
            max-width: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <a href="/">← Home</a>
            <a href="https://github.com/shadidsorowar">GitHub</a>
        </nav>

        <main>
            {{ content }}
        </main>
        
        <footer style="text-align: center; margin-top: 40px; color: var(--sub-text); font-size: 0.8rem;">
            © 2026 | Powered by Coffee and Rants
        </footer>
    </div>

</body>
</html>
