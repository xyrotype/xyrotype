<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <style>
        :root {
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text: #f8fafc;
            --sub-text: #94a3b8;
            --accent: #38bdf8; 
        }

        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin-top: 40px;
        }

        main {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { 
            font-size: 2.8rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            line-height: 1.2;
            font-weight: 800;
        }

        /* Post Archive List Styling */
        .post-list {
            list-style: none;
            padding: 0;
            margin-top: 30px;
        }

        .post-list li {
            margin-bottom: 15px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .post-list li:hover {
            background: rgba(56, 189, 248, 0.08);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .post-link {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
        }

        .post-date {
            color: var(--sub-text);
            font-size: 0.85rem;
            font-family: monospace;
        }

        /* General Content Styling */
        .post-content {
            font-size: 1.15rem;
        }

        nav {
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--sub-text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        hr {
            border: 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 40px 0;
        }

        img {
            max-width: 100%;
            border-radius: 8px;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            main { padding: 25px; }
            .post-list li { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <a href="{{ site.baseurl }}/">Archive</a>
        </nav>

        <main>
            {{ content }}
        </main>
        
        <footer style="text-align: center; margin-top: 40px; color: var(--sub-text); font-size: 0.8rem; opacity: 0.6;">
            &copy; {{ "now" | date: "%Y" }} | Built with Jekyll
        </footer>
    </div>

</body>
</html>
